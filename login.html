<div class="auth-box" id="passwordBox" style="display: none;">
  <h2>Đổi mật khẩu</h2>

  <div class="auth-form">
    <input id="newPassword" type="password" placeholder="Mật khẩu mới">
    <input id="confirmNewPassword" type="password" placeholder="Nhập lại mật khẩu mới">

    <div class="auth-actions">
      <button class="auth-btn blue" onclick="saveNewPassword()">Lưu mật khẩu mới</button>
      <button class="auth-btn gray" onclick="hidePasswordBox()">Hủy</button>
    </div>

    <p class="status-text" id="passwordStatus"></p>
  </div>
</div>
